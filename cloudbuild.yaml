# Cloud Build configuration for LLM-Benchmark-Gateway
# Builds and deploys to Cloud Run

substitutions:
  _SERVICE_NAME: llm-benchmark-gateway
  _REGION: us-central1
  _PLATFORM_ENV: dev
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "10"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # Step 1: Run tests
  - name: 'rust:1.75'
    id: 'test'
    entrypoint: 'cargo'
    args: ['test', '--workspace', '--release']
    env:
      - 'CARGO_HOME=/workspace/.cargo'

  # Step 2: Build release binary
  - name: 'rust:1.75'
    id: 'build'
    entrypoint: 'cargo'
    args: ['build', '--release', '--bin', 'llm-benchmark-api']
    env:
      - 'CARGO_HOME=/workspace/.cargo'

  # Step 3: Build container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'deploy/cloudrun/Dockerfile'
      - '.'

  # Step 4: Push container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push-latest'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=${_MIN_INSTANCES}'
      - '--max-instances=${_MAX_INSTANCES}'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--concurrency=80'
      - '--set-env-vars=SERVICE_NAME=${_SERVICE_NAME}'
      - '--set-env-vars=SERVICE_VERSION=$SHORT_SHA'
      - '--set-env-vars=PLATFORM_ENV=${_PLATFORM_ENV}'
      - '--set-env-vars=RUST_LOG=info,llm_benchmark=debug'
      # Phase 7 Agent Identity (REQUIRED)
      - '--set-env-vars=AGENT_NAME=benchmark-publication-agent'
      - '--set-env-vars=AGENT_DOMAIN=benchmark'
      - '--set-env-vars=AGENT_PHASE=phase7'
      - '--set-env-vars=AGENT_LAYER=layer2'
      - '--set-env-vars=AGENT_VERSION=1.0.0'
      # RuVector (REQUIRED - Phase 7 agents MUST crash if unavailable)
      - '--set-secrets=RUVECTOR_API_KEY=ruvector-api-key:latest'
      - '--service-account=${_SERVICE_NAME}@$PROJECT_ID.iam.gserviceaccount.com'
      - '--ingress=internal-and-cloud-load-balancing'

  # Step 6: Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$$(gcloud run services describe ${_SERVICE_NAME} --region=${_REGION} --format='value(status.url)')
        echo "Service URL: $$SERVICE_URL"

        # Wait for service to be ready
        for i in {1..30}; do
          STATUS=$$(curl -s -o /dev/null -w "%{http_code}" "$$SERVICE_URL/health" || echo "000")
          if [ "$$STATUS" = "200" ]; then
            echo "Service is healthy!"
            exit 0
          fi
          echo "Waiting for service... (attempt $$i/30, status: $$STATUS)"
          sleep 10
        done

        echo "Service health check failed"
        exit 1

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

timeout: '1800s'
