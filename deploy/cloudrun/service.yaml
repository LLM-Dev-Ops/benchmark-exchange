apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: llm-benchmark-gateway
  labels:
    app: llm-benchmark-gateway
    team: agentics-platform
    component: benchmark-gateway
  annotations:
    run.googleapis.com/description: "LLM Benchmark Gateway - Benchmark ingestion and publication entry point"
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Scaling configuration
        autoscaling.knative.dev/minScale: "${MIN_INSTANCES}"
        autoscaling.knative.dev/maxScale: "${MAX_INSTANCES}"

        # VPC Connector for internal communication
        run.googleapis.com/vpc-access-connector: "projects/${PROJECT_ID}/locations/${REGION}/connectors/agentics-vpc-connector"
        run.googleapis.com/vpc-access-egress: private-ranges-only

        # CPU allocation
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"

        # Execution environment
        run.googleapis.com/execution-environment: gen2

    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: "llm-benchmark-gateway@${PROJECT_ID}.iam.gserviceaccount.com"

      containers:
        - name: llm-benchmark-gateway
          image: "gcr.io/${PROJECT_ID}/llm-benchmark-gateway:${SERVICE_VERSION}"

          ports:
            - name: http1
              containerPort: 8080

          resources:
            limits:
              cpu: "2"
              memory: "2Gi"
            requests:
              cpu: "1"
              memory: "1Gi"

          env:
            # Service Identity
            - name: SERVICE_NAME
              value: "llm-benchmark-gateway"
            - name: SERVICE_VERSION
              value: "${SERVICE_VERSION}"
            - name: PLATFORM_ENV
              value: "${PLATFORM_ENV}"

            # Phase 7 Agent Identity (REQUIRED)
            - name: AGENT_NAME
              value: "benchmark-publication-agent"
            - name: AGENT_DOMAIN
              value: "benchmark"
            - name: AGENT_PHASE
              value: "phase7"
            - name: AGENT_LAYER
              value: "layer2"
            - name: AGENT_VERSION
              value: "1.0.0"

            # Server Configuration
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8080"
            - name: RUST_LOG
              value: "${RUST_LOG}"

            # RuVector Service - ALL persistence via this service
            # Phase 7: Agents MUST crash if RuVector is unavailable
            - name: RUVECTOR_SERVICE_URL
              value: "${RUVECTOR_SERVICE_URL}"
            - name: RUVECTOR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ruvector-api-key
                  key: latest

            # Telemetry (LLM-Observatory)
            - name: TELEMETRY_ENDPOINT
              value: "${TELEMETRY_ENDPOINT}"
            - name: TELEMETRY_ENABLED
              value: "true"

            # Integration URLs
            - name: LLM_REGISTRY_URL
              value: "${LLM_REGISTRY_URL}"
            - name: LLM_EXCHANGE_URL
              value: "${LLM_EXCHANGE_URL}"

          # Health probes
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /live
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3

  traffic:
    - percent: 100
      latestRevision: true
