# LLM-Benchmark-Gateway Environment Configuration - Development
# This file defines all required environment variables for the dev environment

# Service Identity
SERVICE_NAME: llm-benchmark-gateway
SERVICE_VERSION: 1.0.0
PLATFORM_ENV: dev

# RuVector Service (Persistence Layer)
# ALL persistence via ruvector-service - NO direct SQL access
RUVECTOR_SERVICE_URL: https://ruvector-service-dev-abc123.run.app
# RUVECTOR_API_KEY: Retrieved from Secret Manager (see secrets section)

# Telemetry (LLM-Observatory)
TELEMETRY_ENDPOINT: https://observatory-dev-abc123.run.app/api/v1/telemetry
TELEMETRY_ENABLED: "true"
TELEMETRY_SAMPLE_RATE: "1.0"

# Logging
LOG_LEVEL: debug
LOG_FORMAT: json
RUST_LOG: "info,llm_benchmark=debug"

# Server Configuration
HOST: "0.0.0.0"
PORT: "8080"
REQUEST_TIMEOUT_SECONDS: "30"
MAX_REQUEST_SIZE_BYTES: "10485760"

# Feature Flags
ENABLE_VALIDATION_STRICT_MODE: "false"
ENABLE_METRICS_ENDPOINT: "true"

# Integration URLs (resolved dynamically)
LLM_REGISTRY_URL: https://registry-dev-abc123.run.app
LLM_EXCHANGE_URL: https://exchange-dev-abc123.run.app

# CORS (dev only)
CORS_ALLOWED_ORIGINS: "*"

# Rate Limiting (relaxed for dev)
RATE_LIMIT_REQUESTS_PER_MINUTE: "1000"
RATE_LIMIT_BURST: "100"
