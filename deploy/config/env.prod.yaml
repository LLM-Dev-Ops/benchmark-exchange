# LLM-Benchmark-Gateway Environment Configuration - Production
# This file defines all required environment variables for the production environment

# Service Identity
SERVICE_NAME: llm-benchmark-gateway
SERVICE_VERSION: 1.0.0
PLATFORM_ENV: prod

# RuVector Service (Persistence Layer)
# ALL persistence via ruvector-service - NO direct SQL access
RUVECTOR_SERVICE_URL: https://ruvector-service-prod-abc123.run.app
# RUVECTOR_API_KEY: Retrieved from Secret Manager (see secrets section)

# Telemetry (LLM-Observatory)
TELEMETRY_ENDPOINT: https://observatory-prod-abc123.run.app/api/v1/telemetry
TELEMETRY_ENABLED: "true"
TELEMETRY_SAMPLE_RATE: "0.1"

# Logging
LOG_LEVEL: warn
LOG_FORMAT: json
RUST_LOG: "warn,llm_benchmark=info"

# Server Configuration
HOST: "0.0.0.0"
PORT: "8080"
REQUEST_TIMEOUT_SECONDS: "300"
MAX_REQUEST_SIZE_BYTES: "10485760"

# Feature Flags
ENABLE_VALIDATION_STRICT_MODE: "true"
ENABLE_METRICS_ENDPOINT: "true"

# Integration URLs (resolved dynamically)
LLM_REGISTRY_URL: https://registry.agentics.io
LLM_EXCHANGE_URL: https://exchange.agentics.io

# CORS (production - strict)
CORS_ALLOWED_ORIGINS: "https://agentics.io,https://*.agentics.io"

# Rate Limiting (production)
RATE_LIMIT_REQUESTS_PER_MINUTE: "300"
RATE_LIMIT_BURST: "30"

# Security
ENABLE_REQUEST_SIGNING: "true"
REQUIRE_AUTH_HEADER: "true"
