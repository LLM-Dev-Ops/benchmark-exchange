# LLM-Benchmark-Gateway Environment Configuration - Staging
# This file defines all required environment variables for the staging environment

# Service Identity
SERVICE_NAME: llm-benchmark-gateway
SERVICE_VERSION: 1.0.0
PLATFORM_ENV: staging

# RuVector Service (Persistence Layer)
# ALL persistence via ruvector-service - NO direct SQL access
RUVECTOR_SERVICE_URL: https://ruvector-service-staging-abc123.run.app
# RUVECTOR_API_KEY: Retrieved from Secret Manager (see secrets section)

# Telemetry (LLM-Observatory)
TELEMETRY_ENDPOINT: https://observatory-staging-abc123.run.app/api/v1/telemetry
TELEMETRY_ENABLED: "true"
TELEMETRY_SAMPLE_RATE: "0.5"

# Logging
LOG_LEVEL: info
LOG_FORMAT: json
RUST_LOG: "info,llm_benchmark=info"

# Server Configuration
HOST: "0.0.0.0"
PORT: "8080"
REQUEST_TIMEOUT_SECONDS: "60"
MAX_REQUEST_SIZE_BYTES: "10485760"

# Feature Flags
ENABLE_VALIDATION_STRICT_MODE: "true"
ENABLE_METRICS_ENDPOINT: "true"

# Integration URLs (resolved dynamically)
LLM_REGISTRY_URL: https://registry-staging-abc123.run.app
LLM_EXCHANGE_URL: https://exchange-staging-abc123.run.app

# CORS (staging - restricted)
CORS_ALLOWED_ORIGINS: "https://*.agentics-staging.dev"

# Rate Limiting
RATE_LIMIT_REQUESTS_PER_MINUTE: "500"
RATE_LIMIT_BURST: "50"
